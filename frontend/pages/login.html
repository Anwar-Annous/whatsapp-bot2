<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>لوحة التحكم - تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
    <link href="../css/style.css" rel="stylesheet" />
  </head>
  <body>
    <div class="login-page d-flex align-items-center justify-content-center min-vh-100">
      <div class="login-card card shadow-lg w-100" style="max-width: 440px;">
        <div class="card-body">
          <div class="brand-header">
            <span class="brand-dot"></span>
            <div>
              <h2 class="brand-title">WhatsApp CRM</h2>
              <p class="brand-subtitle">لوحة تحكم مميزة لإدارة محادثات واتساب وأتمتة ذكية.</p>
            </div>
          </div>
          <form id="loginForm">
            <div class="mb-3">
              <label class="form-label">البريد الإلكتروني</label>
              <input type="email" name="email" class="form-control" placeholder="admin@example.com" required />
            </div>
            <div class="mb-3">
              <label class="form-label">كلمة المرور</label>
              <input type="password" name="password" class="form-control" placeholder="••••••••" required />
            </div>
            <button type="submit" class="btn btn-primary w-100">دخول</button>
          </form>
          <div id="loginAlert" class="mt-3 text-danger" style="display:none;"></div>
        </div>
      </div>
    </div>
    <script>
      document.getElementById('loginForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        const form = event.target;
        const data = { email: form.email.value, password: form.password.value };
        const res = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
        const body = await res.json();
        if (body.success) {
          window.location.href = '/dashboard';
        } else {
          const alert = document.getElementById('loginAlert');
          alert.textContent = body.message || 'فشل تسجيل الدخول';
          alert.style.display = 'block';
        }
      });
    </script>
  </body>
</html>
